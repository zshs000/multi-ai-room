<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>多 AI 讨论室</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #f5f6f8;
    color: #1d1d1f;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #fff;
    padding: 14px 20px;
    border-bottom: 1px solid #e5e5ea;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header button {
    background: #f0f0f3; border: none; padding: 8px 14px;
    border-radius: 8px; cursor: pointer; font-size: 14px;
  }
  header button:hover { background: #e5e5ea; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { max-width: 75%; }
  .msg .who { font-size: 13px; color: #8e8e93; margin-bottom: 4px; padding: 0 4px; }
  .msg .bubble {
    background: #fff;
    border-radius: 14px;
    padding: 12px 16px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    border-left: 4px solid #ccc;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .msg .round-tag { font-size: 11px; color: #c7c7cc; margin-left: 6px; }
  .system-msg { align-self: center; color: #8e8e93; font-size: 13px; }
  .error-msg { align-self: center; color: #ff3b30; font-size: 14px; background:#fff0f0; padding:8px 14px; border-radius:8px; }

  footer {
    background: #fff;
    border-top: 1px solid #e5e5ea;
    padding: 14px 20px;
    display: flex;
    gap: 10px;
  }
  #topic {
    flex: 1; padding: 12px 14px; font-size: 15px;
    border: 1px solid #d1d1d6; border-radius: 10px; outline: none;
  }
  #topic:focus { border-color: #4f8cff; }
  #send {
    background: #4f8cff; color: #fff; border: none;
    padding: 0 24px; border-radius: 10px; font-size: 15px; cursor: pointer;
  }
  #send:disabled { background: #b0c8f5; cursor: not-allowed; }

  /* 设置弹窗 */
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); align-items: center; justify-content: center;
  }
  #overlay.show { display: flex; }
  #settings {
    background: #fff; border-radius: 14px; padding: 24px;
    width: 460px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
  }
  #settings h2 { font-size: 18px; margin-bottom: 16px; }
  #settings label { display: block; font-size: 13px; color: #6e6e73; margin: 12px 0 4px; }
  #settings input {
    width: 100%; padding: 9px 12px; font-size: 14px;
    border: 1px solid #d1d1d6; border-radius: 8px; outline: none;
  }
  #settings input:focus { border-color: #4f8cff; }
  .settings-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
  .settings-actions button { padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
  #save-btn { background: #4f8cff; color: #fff; }
  #cancel-btn { background: #f0f0f3; }
  .hint { font-size: 12px; color: #8e8e93; margin-top: 4px; }
</style>
</head>
<body>
  <header>
    <h1>多 AI 讨论室</h1>
    <button id="open-settings">⚙ 设置</button>
  </header>

  <div id="chat">
    <div class="system-msg">输入一个话题，让多个 AI 智能体轮流讨论。先到设置里填好 API Key。</div>
  </div>

  <footer>
    <input id="topic" placeholder="输入讨论话题，比如：我们要不要做一个登录功能？" />
    <button id="send">开始讨论</button>
  </footer>

  <!-- 设置弹窗 -->
  <div id="overlay">
    <div id="settings">
      <h2>设置</h2>
      <label>API 地址 (Base URL)</label>
      <input id="cfg-baseUrl" placeholder="https://api.deepseek.com/v1" />
      <div class="hint">OpenAI 兼容格式，末尾不用加 /chat/completions</div>
      <label>API Key</label>
      <input id="cfg-apiKey" type="password" placeholder="sk-..." />
      <label>模型名</label>
      <input id="cfg-model" placeholder="deepseek-chat" />
      <label>讨论轮数（每个 AI 各发言几次）</label>
      <input id="cfg-rounds" type="number" min="1" max="10" />
      <div class="settings-actions">
        <button id="cancel-btn">取消</button>
        <button id="save-btn">保存</button>
      </div>
    </div>
  </div>

<script>
const chat = document.getElementById('chat')
const topicInput = document.getElementById('topic')
const sendBtn = document.getElementById('send')
const overlay = document.getElementById('overlay')

// ---------- 设置面板 ----------
async function loadConfigToForm() {
  const cfg = await fetch('/api/config').then(r => r.json())
  document.getElementById('cfg-baseUrl').value = cfg.baseUrl || ''
  document.getElementById('cfg-apiKey').value = cfg.apiKey || ''
  document.getElementById('cfg-model').value = cfg.model || ''
  document.getElementById('cfg-rounds').value = cfg.rounds || 2
}
document.getElementById('open-settings').onclick = async () => {
  await loadConfigToForm()
  overlay.classList.add('show')
}
document.getElementById('cancel-btn').onclick = () => overlay.classList.remove('show')
document.getElementById('save-btn').onclick = async () => {
  const body = {
    baseUrl: document.getElementById('cfg-baseUrl').value.trim(),
    apiKey: document.getElementById('cfg-apiKey').value.trim(),
    model: document.getElementById('cfg-model').value.trim(),
    rounds: Number(document.getElementById('cfg-rounds').value) || 1,
  }
  await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
  overlay.classList.remove('show')
  addSystem('设置已保存。')
}

// ---------- 渲染辅助 ----------
function addSystem(text) {
  const el = document.createElement('div')
  el.className = 'system-msg'
  el.textContent = text
  chat.appendChild(el)
  chat.scrollTop = chat.scrollHeight
}
function addError(text) {
  const el = document.createElement('div')
  el.className = 'error-msg'
  el.textContent = text
  chat.appendChild(el)
  chat.scrollTop = chat.scrollHeight
}

let currentBubble = null
function startBubble(name, color, round) {
  const wrap = document.createElement('div')
  wrap.className = 'msg'
  const who = document.createElement('div')
  who.className = 'who'
  who.innerHTML = `${name} <span class="round-tag">第 ${round} 轮</span>`
  const bubble = document.createElement('div')
  bubble.className = 'bubble'
  bubble.style.borderLeftColor = color
  wrap.appendChild(who)
  wrap.appendChild(bubble)
  chat.appendChild(wrap)
  chat.scrollTop = chat.scrollHeight
  currentBubble = bubble
}
function appendToken(text) {
  if (currentBubble) {
    currentBubble.textContent += text
    chat.scrollTop = chat.scrollHeight
  }
}

// ---------- 开始讨论（读 SSE 流） ----------
async function startDiscussion() {
  const topic = topicInput.value.trim()
  if (!topic) return
  sendBtn.disabled = true
  topicInput.value = ''
  addSystem(`话题：${topic}`)

  const resp = await fetch('/api/discuss', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic }),
  })

  const reader = resp.body.getReader()
  const decoder = new TextDecoder()
  let buffer = ''

  while (true) {
    const { done, value } = await reader.read()
    if (done) break
    buffer += decoder.decode(value, { stream: true })
    const parts = buffer.split('\n\n')
    buffer = parts.pop()
    for (const part of parts) {
      const line = part.trim()
      if (!line.startsWith('data:')) continue
      const evt = JSON.parse(line.slice(5).trim())
      if (evt.type === 'agent_start') startBubble(evt.name, evt.color, evt.round)
      else if (evt.type === 'token') appendToken(evt.text)
      else if (evt.type === 'error') addError(evt.message)
      else if (evt.type === 'done') addSystem('讨论结束。')
    }
  }
  sendBtn.disabled = false
}

sendBtn.onclick = startDiscussion
topicInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startDiscussion()
})
</script>
</body>
</html>
